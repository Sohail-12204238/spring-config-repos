spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: doctor-service
          uri: lb://DOCTOR-SERVICE
          predicates:
            - Path=/doctors/**

        - id: APPOINTMENT-SERVICE
          uri: lb://appointment-service
          predicates:
            - Path=/appointments/**

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
